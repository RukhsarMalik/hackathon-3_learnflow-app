apiVersion: apps/v1
kind: Deployment
metadata:
  name: progress-service
  namespace: default
  labels:
    app: progress-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: progress-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: progress-service
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "progress-service"
        dapr.io/app-port: "8000"
    spec:
      containers:
      - name: progress-service
        image: progress-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        env:
        - name: SERVICE_NAME
          value: "progress-service"
