apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: redis-state
  namespace: learnflow
spec:
  type: state.redis
  version: v1
  metadata:
    - name: redisHost
      value: "redis-master.learnflow.svc.cluster.local:6379"
    - name: redisPassword
      secretKeyRef:
        name: redis-secret
        key: redis-password
    - name: actorStateStore
      value: "true"
    - name: keyPrefix
      value: "none"
